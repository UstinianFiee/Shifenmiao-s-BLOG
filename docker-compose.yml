version: '3.8'

services:
  backend:
    build: ./backend
    container_name: blog-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - ./backend/.env
    networks:
      - blog-net

  frontend:
    build: ./frontend
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - backend
    networks:
      - blog-net

networks:
  blog-net:
    driver: bridge

volumes:
  uploads:
